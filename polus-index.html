<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLUS Editor | 标榜教育基金会排版工具</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--polus-red:#8A1A24;
--polus-gold:#B8860B;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:#f5f5f5;
}

/* layout */

.container{
display:flex;
height:100vh;
}

/* editor */

.editor{
width:50%;
padding:30px;
background:white;
border-right:1px solid #eee;
}

textarea{
width:100%;
height:80vh;
border:1px solid #ddd;
padding:15px;
font-size:15px;
line-height:1.7;
outline:none;
resize:none;
}

textarea:focus{
border-color:var(--polus-red);
}

/* preview */

.preview{
width:50%;
padding:40px;
overflow:auto;
}

.wechat{
background:white;
max-width:420px;
margin:auto;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* brand header */

.brand{
text-align:center;
margin-bottom:30px;
}

.brand h1{
font-family:"Noto Serif SC",serif;
color:var(--polus-red);
font-size:20px;
letter-spacing:1px;
margin:0;
}

.brand small{
color:#888;
}

/* title */

.main-title{
font-family:"Noto Serif SC",serif;
font-size:28px;
font-weight:700;
margin:20px 0 10px;
}

.sub-title{
color:#666;
margin-bottom:10px;
}

.meta{
color:#999;
font-size:13px;
margin-bottom:25px;
}

/* intro */

.intro{
border-left:4px solid var(--polus-red);
background:#fafafa;
padding:15px;
margin:20px 0;
}

/* insight */

.insight{
margin:35px 0 10px;
}

.insight-label{
color:var(--polus-red);
font-size:12px;
letter-spacing:2px;
font-weight:600;
}

.insight-line{
height:2px;
background:var(--polus-gold);
width:60px;
margin:6px 0 10px;
}

.insight-title{
font-size:20px;
font-family:"Noto Serif SC",serif;
}

/* paragraph */

p{
line-height:1.8;
color:#333;
}

/* quote */

blockquote{
border-left:3px solid var(--polus-gold);
padding-left:12px;
color:#555;
margin:18px 0;
}

/* divider */

.divider{
text-align:center;
margin:30px 0;
}

.divider span{
display:inline-block;
width:60px;
height:2px;
background:var(--polus-gold);
}

/* buttons */

.toolbar{
margin-bottom:15px;
}

button{
background:var(--polus-red);
color:white;
border:none;
padding:10px 14px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<div class="editor">

<div class="toolbar">
<button onclick="copyHTML()">复制公众号HTML</button>
</div>

<textarea id="input">

# 谁扫银杏叶？
@ 社区剧场观察
% POLUS Editorial
$ 2025

!! 在社区剧场的空间里，舞台不只是表演的地方，它也成为公共讨论的现场。

## 谁在清扫落叶？

社区剧场往往由普通人组成，他们既是观众，也是参与者。

> 剧场并不只属于演员，它属于整个社区。

在这样的空间里，故事被重新讲述。

---

## 社区与舞台

当社区进入舞台，艺术也重新回到生活。

</textarea>

</div>

<div class="preview">
<div class="wechat" id="preview"></div>
</div>

</div>

<script>

const input=document.getElementById("input")
const preview=document.getElementById("preview")

function render(){

const lines=input.value.split("\n")

let html=`
<div class="brand">
<h1>POLUS</h1>
<small>Educational Foundation</small>
</div>
`

lines.forEach(line=>{

if(line.startsWith("# ")){

html+=`<div class="main-title">${line.replace("# ","")}</div>`

}

else if(line.startsWith("@ ")){

html+=`<div class="sub-title">${line.replace("@ ","")}</div>`

}

else if(line.startsWith("% ")){

html+=`<div class="meta">作者：${line.replace("% ","")}</div>`

}

else if(line.startsWith("$ ")){

html+=`<div class="meta">日期：${line.replace("$ ","")}</div>`

}

else if(line.startsWith("!! ")){

html+=`<div class="intro">${line.replace("!! ","")}</div>`

}

else if(line.startsWith("## ")){

html+=`
<div class="insight">
<div class="insight-label">POLUS INSIGHT</div>
<div class="insight-line"></div>
<div class="insight-title">${line.replace("## ","")}</div>
</div>
`

}

else if(line.startsWith("> ")){

html+=`<blockquote>${line.replace("> ","")}</blockquote>`

}

else if(line.startsWith("---")){

html+=`<div class="divider"><span></span></div>`

}

else if(line.trim()!=""){

html+=`<p>${line}</p>`

}

})

preview.innerHTML=html

}

input.addEventListener("input",render)

render()

function copyHTML(){

const temp=document.createElement("textarea")

temp.value=preview.innerHTML

document.body.appendChild(temp)

temp.select()

document.execCommand("copy")

document.body.removeChild(temp)

alert("公众号HTML已复制")

}

</script>

</body>
</html>
