<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>POLUS Editor</title>

<style>

body{
background:#f3f3f3;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
padding:40px;
}

.container{
display:flex;
gap:40px;
}

.editor{
width:460px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.preview{
width:420px;
background:white;
padding:30px 20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:auto;
}

textarea{
width:100%;
height:420px;
border:1px solid #ddd;
border-radius:8px;
padding:12px;
font-size:14px;
line-height:1.6;
}

button{
background:#8A1A24;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:black;
}

</style>

</head>

<body>

<div class="container">

<div class="editor">

<h3>POLUS 排版助手</h3>

<textarea id="input">

# 谁扫银杏叶？

@社区剧场首演圆满落幕
%标榜教育基金会
$2026.01.29

!! 她们不是演员，她们是住在这里的人。

## POLUS INSIGHT

这不是一个被“编写”的剧本，而是一段被共同经历出来的故事。

> 应用戏剧是一种重新连接人与人的方式。

---

## 剧场纪实

剧情来自社区生活。

</textarea>

<button onclick="render()">生成排版</button>
<button onclick="copy()">复制到公众号</button>

</div>


<div id="preview" class="preview"></div>

</div>


<script>

function render(){

let text=document.getElementById("input").value
let lines=text.split("\n")

let html=""

let title="",subtitle="",author="",date=""

lines.forEach(line=>{

line=line.trim()

if(line.startsWith("# ")){

title=line.replace("# ","")

}

else if(line.startsWith("@")){

subtitle=line.replace("@","")

}

else if(line.startsWith("%")){

author=line.replace("%","")

}

else if(line.startsWith("$")){

date=line.replace("$","")

}

else if(line.startsWith("!!")){

html+=`
<section style="
background:#fafafa;
border-left:3px solid #8A1A24;
padding:20px;
margin:30px 0;
color:#555">
${line.replace("!!","")}
</section>
`

}

else if(line.startsWith("##")){

html+=`
<section style="margin:50px 0 25px 0;text-align:center">

<div style="
font-size:11px;
letter-spacing:4px;
color:#8A1A24;
opacity:0.6;
font-weight:bold
">
POLUS INSIGHT
</div>

<div style="
width:25px;
height:2px;
background:#B8860B;
margin:10px auto
"></div>

<div style="
font-size:20px;
font-weight:bold">
${line.replace("## ","")}
</div>

</section>
`

}

else if(line.startsWith(">")){

html+=`
<section style="
border-left:2px solid #8A1A24;
padding-left:15px;
margin:20px 0;
color:#666">
${line.replace(">","")}
</section>
`

}

else if(line==="---"){

html+=`
<section style="
width:40px;
height:2px;
background:#B8860B;
margin:40px auto"></section>
`

}

else if(line!==""){

html+=`<p style="margin-bottom:16px">${line}</p>`

}

})

let header=`

<section style="text-align:center;margin-bottom:50px">

<div style="
font-size:22px;
letter-spacing:12px;
font-weight:bold;
color:#8A1A24
">POLUS</div>

<div style="
font-size:10px;
letter-spacing:3px;
color:#999
">Educational Foundation</div>

<div style="
width:20px;
height:2px;
background:#B8860B;
margin:15px auto
"></div>

</section>

<section style="text-align:center;margin-bottom:40px">

<h1 style="font-size:26px;font-weight:bold;margin-bottom:10px">${title}</h1>

<div style="
color:#8A1A24;
font-weight:bold;
letter-spacing:3px;
margin-bottom:10px">
${subtitle}
</div>

<div style="font-size:12px;color:#999">
${author} ｜ ${date}
</div>

</section>

`

let footer=`

<section style="
margin-top:70px;
border-top:1px solid #eee;
padding-top:30px;
text-align:center">

<div style="
letter-spacing:10px;
font-size:12px;
color:#8A1A24">
END
</div>

<div style="color:#999;font-size:12px;margin-top:10px">
POLUS INTERNATIONAL EDUCATION FOUNDATION
</div>

</section>
`

document.getElementById("preview").innerHTML=`
<section style="font-size:16px;color:#333;line-height:1.8">
${header}
${html}
${footer}
</section>
`

}



function copy(){

let node=document.getElementById("preview")

let html=node.innerHTML
let text=node.innerText

let blob=new Blob([html],{type:"text/html"})
let textBlob=new Blob([text],{type:"text/plain"})

navigator.clipboard.write([
new ClipboardItem({
"text/html":blob,
"text/plain":textBlob
})
])

alert("复制成功，请粘贴到公众号")

}

</script>

</body>
</html>
