<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>POLUS 标榜教育基金会排版助手</title>

<style>

body{
background:#f4f4f4;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
padding:40px;
}

.container{
display:flex;
gap:40px;
}

.editor{
width:420px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.preview{
width:420px;
background:white;
padding:30px 20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:auto;
}

input,textarea{
width:100%;
margin-bottom:12px;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

textarea{
height:180px;
}

button{
background:#8A1A24;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:6px;
}

button:hover{
background:black;
}

</style>

</head>

<body>

<div class="container">

<div class="editor">

<h3>POLUS排版助手</h3>

<input id="title" placeholder="文章标题">

<input id="subtitle" placeholder="副标题">

<input id="author" placeholder="作者">

<input id="date" placeholder="日期">

<textarea id="content" placeholder="正文（段落换行即可）"></textarea>

<button onclick="render()">生成排版</button>

<button onclick="copy()">复制到公众号</button>

</div>


<div id="preview" class="preview"></div>

</div>


<script>

function render(){

let title=document.getElementById("title").value
let subtitle=document.getElementById("subtitle").value
let author=document.getElementById("author").value
let date=document.getElementById("date").value
let content=document.getElementById("content").value

content=content.replace(/\n/g,"</p><p>")

let html=`

<section style="font-size:16px;color:#333;line-height:1.8">

<section style="text-align:center;margin-bottom:40px">

<div style="
font-size:22px;
letter-spacing:12px;
font-weight:bold;
color:#8A1A24
">POLUS</div>

<div style="
font-size:10px;
letter-spacing:3px;
color:#999
">Educational Foundation</div>

<div style="
width:20px;
height:2px;
background:#B8860B;
margin:14px auto
"></div>

</section>

<section style="text-align:center;margin-bottom:40px">

<h1 style="
font-size:26px;
font-weight:bold;
line-height:1.4;
margin-bottom:10px
">
${title}
</h1>

<div style="
color:#8A1A24;
font-weight:bold;
letter-spacing:3px;
margin-bottom:10px
">
${subtitle}
</div>

<div style="font-size:12px;color:#999">
${author} ｜ ${date}
</div>

</section>


<section style="
background:#fafafa;
padding:20px;
border-left:3px solid #8A1A24;
margin-bottom:30px
">

<p>${content}</p>

</section>

<section style="
text-align:center;
margin-top:60px;
border-top:1px solid #eee;
padding-top:30px
">

<div style="
letter-spacing:10px;
color:#8A1A24;
font-size:12px;
margin-bottom:10px
">END</div>

<div style="color:#999;font-size:12px">
POLUS INTERNATIONAL EDUCATION FOUNDATION
</div>

</section>

</section>

`

document.getElementById("preview").innerHTML=html

}


function copy(){

let node=document.getElementById("preview")

let html=node.innerHTML
let text=node.innerText

let blob=new Blob([html],{type:"text/html"})
let textBlob=new Blob([text],{type:"text/plain"})

navigator.clipboard.write([
new ClipboardItem({
"text/html":blob,
"text/plain":textBlob
})
])

alert("已复制，请直接粘贴到公众号后台")

}

</script>

</body>
</html>
